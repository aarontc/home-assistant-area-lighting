stages:
  - check
  - nightly

# Install Dagger CLI (version from .tool-versions)
.dagger-setup: &dagger-setup
  - apk add --no-cache curl
  - DAGGER_VERSION=$(grep '^dagger ' .tool-versions | awk '{print $2}')
  - curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin DAGGER_VERSION=$DAGGER_VERSION sh

check:
  stage: check
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DAGGER_NO_NAG: "1"
  before_script:
    - *dagger-setup
  script:
    - dagger call all --source=.
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

nightly:
  stage: nightly
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DAGGER_NO_NAG: "1"
  before_script:
    - *dagger-setup
  script:
    - dagger call test-latest --source=.
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
