stages:
  - check
  - tag
  - nightly

# Install Dagger CLI (version from .tool-versions)
.dagger-setup: &dagger-setup
  - apk add --no-cache curl
  - DAGGER_VERSION=$(grep '^dagger ' .tool-versions | awk '{print $2}')
  - curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR=/usr/local/bin DAGGER_VERSION=$DAGGER_VERSION sh

check:
  stage: check
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DAGGER_NO_NAG: "1"
  before_script:
    - *dagger-setup
  script:
    - dagger call all
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Auto-tag pushes to the default branch. The severity is derived from commit
# subjects carrying `(Major)`, `(Minor)`, or `(Patch)` prefixes — see
# CONTRIBUTING.md#versioning.
#
# Required CI/CD variables:
#   PROJECT_ACCESS_TOKEN  GitLab token with `write_repository` scope
#   GITHUB_TOKEN          Fine-grained GitHub PAT with `contents: write`
#                         on the mirror repo (publishes the release HACS
#                         reads)
#
# The release step has to run in this same job — the version-bump
# commit's `[skip ci]` marker also suppresses the tag's own pipeline,
# so a dedicated `$CI_COMMIT_TAG` job would never fire.
tag:auto:
  stage: tag
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DAGGER_NO_NAG: "1"
    # The create-tag function needs the full history + tags to resolve the
    # previous release; the default shallow fetch depth of 20 is not enough.
    GIT_DEPTH: "0"
  before_script:
    - *dagger-setup
  script:
    - |
      dagger call create-tag \
        --source=. \
        --gitlab-url=$CI_SERVER_URL \
        --project-id=$CI_PROJECT_ID \
        --token=env:PROJECT_ACCESS_TOKEN \
        --branch=$CI_COMMIT_BRANCH \
        --github-token=env:GITHUB_TOKEN \
        --github-repo=aarontc/home-assistant-area-lighting
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

nightly:
  stage: nightly
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DAGGER_NO_NAG: "1"
  before_script:
    - *dagger-setup
  script:
    - dagger call test-latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
